# ─── TransMule — Docker Compose ────────────────────────────────────────────────
# Brings up aMule, Transmission, slskd (Soulseek), pyLoad, the API middleware
# and the frontend.
#
# Usage:
#   cp .env.example .env        # edit passwords / paths
#   docker compose up -d        # start all services
#   docker compose logs -f      # follow logs
#
# Ports exposed to host:
#   3001  → App (Nuxt SPA + API via nginx)
#   16881 → aMule TCP (ED2K)       — configurable via AMULE_ED2K_TCP_PORT
#   16882 → aMule UDP (ED2K)       — configurable via AMULE_ED2K_UDP_PORT
#   16883 → aMule UDP (Kademlia)   — configurable via AMULE_KAD_UDP_PORT
#   16884 → Transmission peer port — configurable via TRANSMISSION_PEER_PORT
#   50300 → slskd Soulseek P2P     — configurable via SLSKD_P2P_PORT
#
# Internal only (Docker network, not exposed to host):
#   4712  → aMule EC protocol (accessible by app container)
#   9091  → Transmission RPC (accessible by app container)
#   8000  → pyLoad web UI + API (accessible by app container)
#   5030  → slskd web UI + API (accessible by app container)
#   3000  → Nitro API — loopback inside app container, never on Docker network
# ──────────────────────────────────────────────────────────────────────────────

services:
  # ── aMule daemon ────────────────────────────────────────────────────────────
  amule:
    image: ${AMULE_IMAGE:-ngosang/amule:latest}
    container_name: transmule-amule
    restart: unless-stopped
    ports:
      - "${AMULE_ED2K_TCP_PORT:-16881}:16881" # ED2K TCP
      - "${AMULE_ED2K_UDP_PORT:-16882}:16882/udp" # ED2K UDP
      - "${AMULE_KAD_UDP_PORT:-16883}:16883/udp" # Kademlia
    volumes:
      - amule-config:/home/amule/.aMule
      - ${DOWNLOAD_DIR:-./downloads}:/downloads
      - ${INCOMPLETE_DIR:-./incomplete}:/incomplete
      - ./docker/amule:/amule-init:ro
    entrypoint: ["sh", "/amule-init/wrap-entrypoint.sh"]
    environment:
      PUID: ${PUID:-1000}
      PGID: ${PGID:-1000}
      GUI_PWD: ${AMULE_GUI_PASSWORD:-hLETKciXJlnMAN0Z}
      WEBUI_PWD: ${AMULE_GUI_PASSWORD:-hLETKciXJlnMAN0Z}
      INCOMING_DIR: /downloads
      TEMP_DIR: /incomplete
      MOD_AUTO_SHARE_ENABLED: "true"
      MOD_AUTO_SHARE_DIRECTORIES: "/downloads"
    networks:
      - transmule

  # ── Transmission daemon ─────────────────────────────────────────────────────
  transmission:
    image: ${TRANSMISSION_IMAGE:-lscr.io/linuxserver/transmission:latest}
    container_name: transmule-transmission
    restart: unless-stopped
    ports:
      - "${TRANSMISSION_PEER_PORT:-16884}:16884" # Peer TCP
      - "${TRANSMISSION_PEER_PORT:-16884}:16884/udp" # Peer UDP
    expose:
      - "9091" # Transmission RPC — internal only (middleware)
    volumes:
      - transmission-config:/config
      - ${DOWNLOAD_DIR:-./downloads}:/downloads
      - ${INCOMPLETE_DIR:-./incomplete}:/incomplete
      - ./docker/transmission/custom-cont-init.d:/custom-cont-init.d:ro
    environment:
      PUID: ${PUID:-1000}
      PGID: ${PGID:-1000}
      TZ: ${TZ:-Europe/Madrid}
      USER: ${TRANSMISSION_USER:-}
      PASS: ${TRANSMISSION_PASS:-}
    networks:
      - transmule

  # ── slskd Soulseek client ─────────────────────────────────────────────────
  slskd:
    image: ${SLSKD_IMAGE:-slskd/slskd:latest}
    container_name: transmule-slskd
    restart: unless-stopped
    ports:
      - "${SLSKD_P2P_PORT:-50300}:50300" # Soulseek P2P
    expose:
      - "5030" # Web UI — internal only (middleware)
    volumes:
      - slskd-config:/app
      - ${DOWNLOAD_DIR:-./downloads}:/downloads
    environment:
      PUID: ${PUID:-1000}
      PGID: ${PGID:-1000}
      SLSKD_REMOTE_CONFIGURATION: "true"
      SLSKD_DOWNLOADS_DIR: /downloads
    networks:
      - transmule

  # ── pyLoad NG download manager ──────────────────────────────────────────────
  pyload:
    image: ${PYLOAD_IMAGE:-lscr.io/linuxserver/pyload-ng:latest}
    container_name: transmule-pyload
    restart: unless-stopped
    expose:
      - "8000" # pyLoad web UI + API — internal only (middleware)
    volumes:
      - pyload-config:/config
      - ${DOWNLOAD_DIR:-./downloads}:/downloads
    environment:
      PUID: ${PUID:-1000}
      PGID: ${PGID:-1000}
      TZ: ${TZ:-Europe/Madrid}
    networks:
      - transmule

  # ── App (Nitro API + Nuxt SPA via nginx) ──────────────────────────────────
  # Pulled from GHCR (multi-arch: amd64 + arm64).
  # Single container: supervisord runs nginx (port 3001) and Nitro (loopback).
  # nginx reverse-proxies /api/* and /_scalar to Nitro internally.
  app:
    image: ${TRANSMULE_APP_IMAGE:-ghcr.io/jo3l/transmule:latest}
    container_name: transmule-app
    restart: unless-stopped
    ports:
      - "3001:3001"
    volumes:
      - ${DATA_DIR:-./data}:/app/data
      - ${DOWNLOAD_DIR:-./downloads}:/downloads:rw
      - /var/run/docker.sock:/var/run/docker.sock:ro
    environment:
      NITRO_AMULE_HOST: amule
      NITRO_AMULE_PORT: 4712
      NITRO_AMULE_PASSWORD: ${AMULE_GUI_PASSWORD:-hLETKciXJlnMAN0Z}
      NITRO_TRANSMISSION_URL: http://transmission:9091/transmission/rpc
      NITRO_TRANSMISSION_USERNAME: ${TRANSMISSION_USER:-}
      NITRO_TRANSMISSION_PASSWORD: ${TRANSMISSION_PASS:-}
      NITRO_PYLOAD_URL: http://pyload:8000
      NITRO_PYLOAD_USERNAME: ${PYLOAD_USER:-pyload}
      NITRO_PYLOAD_PASSWORD: ${PYLOAD_PASSWORD:-pyload}
      NITRO_SLSKD_URL: http://slskd:5030
      NITRO_JWT_SECRET: ${JWT_SECRET:-change-me-to-a-random-string}
      NITRO_DOWNLOADS_DIR: /downloads
      NITRO_AMULE_ED2K_TCP_PORT: ${AMULE_ED2K_TCP_PORT:-16881}
      NITRO_AMULE_ED2K_UDP_PORT: ${AMULE_ED2K_UDP_PORT:-16882}
      NITRO_AMULE_KAD_UDP_PORT: ${AMULE_KAD_UDP_PORT:-16883}
      NITRO_TRANSMISSION_PEER_PORT: ${TRANSMISSION_PEER_PORT:-16884}
    depends_on:
      - amule
      - transmission
      - slskd
      - pyload
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - transmule

volumes:
  amule-config:
  transmission-config:
  slskd-config:
  pyload-config:

networks:
  transmule:
    driver: bridge
