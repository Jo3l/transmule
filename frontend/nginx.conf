server {
    listen 3001;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Don't emit absolute redirects (e.g. trailing-slash rewrites) — they would
    # include the internal port 3001 instead of the external reverse-proxy URL.
    absolute_redirect off;

    # Reverse-proxy API calls and Swagger docs to the Nitro process running
    # on loopback inside this same container.
    location /api/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 120s;
    }

    location /_scalar {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    # SPA fallback — let Nuxt handle client-side routing
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache static assets aggressively
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # No caching for the HTML shell (allows instant deploy updates)
    location = /index.html {
        expires -1;
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }
}
