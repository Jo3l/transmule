# ─── TransMule — Unraid Compose Manager ──────────────────────────────────────
# Install the "Compose Manager" plugin on Unraid (Community Apps).
# Then place this file (and .env) in:
#   /boot/config/plugins/compose.manager/projects/transmule/
#
# Usage on Unraid:
#   1. Copy this file and .env to the path above.
#   2. Edit .env with your passwords and paths.
#   3. In the Unraid UI → Docker → Compose Manager → "transmule" → Up.
#
# Single image: ghcr.io/jo3l/transmule contains both the Nuxt SPA (nginx) and the
# Nitro API (Node.js). Only one port (3001) is exposed. nginx proxies /api/*
# and /_scalar to Nitro running on loopback inside the container.
# ─────────────────────────────────────────────────────────────────────────────

services:
  # ── aMule daemon ─────────────────────────────────────────────────────────
  amule:
    image: ngosang/amule:latest
    container_name: transmule-amule
    restart: unless-stopped
    ports:
      - "${AMULE_ED2K_TCP_PORT:-4662}:4662"
      - "${AMULE_ED2K_UDP_PORT:-4672}:4672/udp"
      - "${AMULE_KAD_UDP_PORT:-4665}:4665/udp"
    volumes:
      - ${APPDATA_DIR:-/mnt/user/appdata/transmule}/amule:/home/amule/.aMule
      - ${DOWNLOAD_DIR:-/mnt/user/downloads}:/downloads
      - ${INCOMPLETE_DIR:-/mnt/user/incomplete}:/incomplete
      - ${APPDATA_DIR:-/mnt/user/appdata/transmule}/amule-init:/amule-init:ro
    entrypoint: ["sh", "/amule-init/wrap-entrypoint.sh"]
    environment:
      PUID: ${PUID:-99}
      PGID: ${PGID:-100}
      GUI_PWD: ${AMULE_GUI_PASSWORD:-changeme}
      WEBUI_PWD: ${AMULE_GUI_PASSWORD:-changeme}
      INCOMING_DIR: /downloads
      TEMP_DIR: /incomplete
    networks:
      - transmule

  # ── Transmission daemon ──────────────────────────────────────────────────
  transmission:
    image: lscr.io/linuxserver/transmission:latest
    container_name: transmule-transmission
    restart: unless-stopped
    ports:
      - "${TRANSMISSION_PEER_PORT:-51413}:51413"
      - "${TRANSMISSION_PEER_PORT:-51413}:51413/udp"
    expose:
      - "9091"
    volumes:
      - ${APPDATA_DIR:-/mnt/user/appdata/transmule}/transmission:/config
      - ${DOWNLOAD_DIR:-/mnt/user/downloads}:/downloads
      - ${INCOMPLETE_DIR:-/mnt/user/incomplete}:/incomplete
    environment:
      PUID: ${PUID:-99}
      PGID: ${PGID:-100}
      TZ: ${TZ:-UTC}
      USER: ${TRANSMISSION_USER:-}
      PASS: ${TRANSMISSION_PASS:-}
    networks:
      - transmule

  # ── pyLoad NG ────────────────────────────────────────────────────────────
  pyload:
    image: lscr.io/linuxserver/pyload-ng:latest
    container_name: transmule-pyload
    restart: unless-stopped
    expose:
      - "8000"
    volumes:
      - ${APPDATA_DIR:-/mnt/user/appdata/transmule}/pyload:/config
      - ${DOWNLOAD_DIR:-/mnt/user/downloads}:/downloads
    environment:
      PUID: ${PUID:-99}
      PGID: ${PGID:-100}
      TZ: ${TZ:-UTC}
    networks:
      - transmule

  # ── App (Nitro API + Nuxt SPA via nginx) ─────────────────────────────────
  # Single container: supervisord runs nginx (port 3001) and Nitro (loopback).
  # nginx reverse-proxies /api/* and /_scalar to Nitro internally.
  app:
    image: ghcr.io/jo3l/transmule:latest
    container_name: transmule-app
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-3001}:3001"
    volumes:
      - ${APPDATA_DIR:-/mnt/user/appdata/transmule}/data:/app/data
      - ${DOWNLOAD_DIR:-/mnt/user/downloads}:/downloads:rw
      - /var/run/docker.sock:/var/run/docker.sock:ro
    environment:
      NITRO_AMULE_HOST: amule
      NITRO_AMULE_PORT: 4712
      NITRO_AMULE_PASSWORD: ${AMULE_GUI_PASSWORD:-changeme}
      NITRO_TRANSMISSION_URL: http://transmission:9091/transmission/rpc
      NITRO_TRANSMISSION_USERNAME: ${TRANSMISSION_USER:-}
      NITRO_TRANSMISSION_PASSWORD: ${TRANSMISSION_PASS:-}
      NITRO_PYLOAD_URL: http://pyload:8000
      NITRO_PYLOAD_USERNAME: ${PYLOAD_USER:-pyload}
      NITRO_PYLOAD_PASSWORD: ${PYLOAD_PASSWORD:-pyload}
      NITRO_JWT_SECRET: ${JWT_SECRET:-}
      NITRO_DOWNLOADS_DIR: /downloads
    depends_on:
      - amule
      - transmission
      - pyload
    networks:
      - transmule

networks:
  transmule:
    driver: bridge
